<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Chat</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 { color: #4285f4; }
    #chat {
      width: 90%;
      max-width: 800px;
      height: 400px;
      margin: 20px auto;
      border: 1px solid #444;
      background: #1a1a1a;
      overflow-y: auto;
      padding: 15px;
      text-align: left;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .message { margin-bottom: 15px; line-height: 1.4; }
    .user { color: #ffca28; font-weight: bold; }
    .bot { color: #64b5f6; font-weight: bold; }
    .error { color: #ef5350; background: rgba(239, 83, 80, 0.1); padding: 5px; border-radius: 4px; }
    
    .input-container {
      margin-top: 20px;
    }
    input {
      width: 60%;
      padding: 12px;
      border: 1px solid #444;
      background: #222;
      color: white;
      border-radius: 4px;
      outline: none;
    }
    input:focus { border-color: #4285f4; }
    button {
      padding: 12px 24px;
      cursor: pointer;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      transition: background 0.3s;
    }
    button:hover { background: #3367d6; }
  </style>
</head>
<body>

<h1>🤖 Gemini Chat</h1>

<div id="chat"></div>

<div class="input-container">
  <input id="input" placeholder="Напиши сообщение..." onkeypress="if(event.key==='Enter') send()" />
  <button onclick="send()">Отправить</button>
</div>

<script>
// Ваш API Ключ
const API_KEY = "AIzaSyC9e9vo7116duboxJRLyQdEpBYfarkgfF4"; 
// Актуальная бесплатная модель
const MODEL_NAME = "gemini-1.5-flash"; 

async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const userText = input.value.trim();
  if (!userText) return;

  // Отображаем сообщение пользователя
  chat.innerHTML += `<div class="message"><span class="user">🧑 Вы:</span> ${userText}</div>`;
  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [
            {
              parts: [{ text: userText }]
            }
          ]
        })
      }
    );

    const data = await response.json();
    console.log("Response:", data);

    if (data.error) {
      chat.innerHTML += `<div class="message error">❌ Ошибка: ${data.error.message}</div>`;
    } else {
      const botText = data.candidates?.[0]?.content?.parts?.[0]?.text;
      
      if (botText) {
        // Форматируем текст (заменяем переносы строк на <br>)
        const formattedText = botText.replace(/\n/g, "<br>");
        chat.innerHTML += `<div class="message"><span class="bot">🤖 Gemini:</span><br>${formattedText}</div>`;
      } else {
        chat.innerHTML += `<div class="message error">❌ Модель не смогла сгенерировать ответ (возможно, сработал фильтр контента).</div>`;
      }
    }

    // Скролл вниз после ответа
    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    chat.innerHTML += `<div class="message error">❌ Ошибка сети: ${err.message}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }
}
</script>

</body>
</html>
