<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Chat Fix</title>
  <style>
    body { background: #111; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
    h1 { color: #4285f4; }
    #chat {
      width: 90%; max-width: 800px; height: 400px; margin: 20px auto;
      border: 1px solid #444; background: #1a1a1a; overflow-y: auto;
      padding: 15px; text-align: left; border-radius: 8px;
    }
    .message { margin-bottom: 15px; }
    .user { color: #ffca28; font-weight: bold; }
    .bot { color: #64b5f6; font-weight: bold; }
    .error { color: #ef5350; background: rgba(239, 83, 80, 0.1); padding: 10px; border-radius: 4px; border-left: 4px solid #ef5350; }
    input { width: 60%; padding: 12px; border: 1px solid #444; background: #222; color: white; border-radius: 4px; }
    button { padding: 12px 24px; cursor: pointer; background: #4285f4; color: white; border: none; border-radius: 4px; font-weight: bold; }
    button:hover { background: #3367d6; }
  </style>
</head>
<body>

<h1>🤖 Gemini Chat</h1>

<div id="chat"></div>

<div class="input-container">
  <input id="input" placeholder="Напиши сообщение..." onkeypress="if(event.key==='Enter') send()" />
  <button onclick="send()">Отправить</button>
</div>

<script>
// Твой API Ключ
const API_KEY = "AIzaSyC9e9vo7116duboxJRLyQdEpBYfarkgfF4"; 

// Используем версию v1 и добавляем -latest к модели
const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;

async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");
  const userText = input.value.trim();
  
  if (!userText) return;

  chat.innerHTML += `<div class="message"><span class="user">🧑 Вы:</span> ${userText}</div>`;
  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: userText }] }]
      })
    });

    const data = await response.json();

    if (data.error) {
      // Если ошибка "модель не найдена", выводим понятную подсказку
      let errorMsg = data.error.message;
      if (data.error.status === "NOT_FOUND") {
        errorMsg = "Модель не найдена. Проверь регион (нужен VPN) или попробуй создать новый API-ключ.";
      }
      chat.innerHTML += `<div class="message error">❌ ${errorMsg}</div>`;
    } else {
      const botText = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (botText) {
        chat.innerHTML += `<div class="message"><span class="bot">🤖 Gemini:</span><br>${botText.replace(/\n/g, "<br>")}</div>`;
      } else {
        chat.innerHTML += `<div class="message error">❌ Ответ пуст (фильтр безопасности).</div>`;
      }
    }
  } catch (err) {
    chat.innerHTML += `<div class="message error">❌ Ошибка сети: ${err.message}</div>`;
  }
  
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
